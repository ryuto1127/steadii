# Mechanical PII / leak guard on every PR.
#
# Runs `scripts/check-no-pii.sh` against the PR's diff vs base branch.
# If a known-leak pattern is detected, the check fails and the PR cannot
# merge until the leak is scrubbed.
#
# Coverage (all via the SAME scripts/check-no-pii.sh patterns):
#   - file diff (BASE..HEAD)         — the range-scan step.
#   - commit message bodies in range — the SAME range-scan step (`--range`
#                                      now scans messages too).
#   - PR title + body                — the dedicated --text step below.
# This closes the PR #329 gap, where a leak pasted into the commit message
# + PR body passed because only the file diff was scanned.
#
# Pattern sources:
#   scripts/pii-patterns-universal.txt  ← always loaded (committed, public)
#   scripts/pii-patterns.local.txt      ← materialized at runtime from the
#                                         `PII_PATTERNS_LOCAL` repo secret
#                                         (Settings → Secrets and variables
#                                         → Actions). If the secret is unset,
#                                         only universal patterns run.
#
# To make this check REQUIRED for merge, branch protection on `main` already
# has `scan` selected under "Require status checks to pass before merging".

name: pii-check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  scan:
    name: scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR head with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Materialize local patterns from secret
        env:
          LOCAL_PATTERNS: ${{ secrets.PII_PATTERNS_LOCAL }}
        run: |
          if [ -n "${LOCAL_PATTERNS:-}" ]; then
            printf '%s\n' "$LOCAL_PATTERNS" > scripts/pii-patterns.local.txt
            echo "Loaded $(grep -cv '^\s*\(#\|$\)' scripts/pii-patterns.local.txt) local patterns from secret."
          else
            echo "PII_PATTERNS_LOCAL secret not set — running with universal patterns only."
            echo "To enable maintainer-specific pattern matching in CI, set the secret at:"
            echo "  Settings → Secrets and variables → Actions → New repository secret"
            echo "  Name: PII_PATTERNS_LOCAL"
            echo "  Value: contents of scripts/pii-patterns.local.txt"
          fi

      - name: Compute scan range
        id: range
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            echo "range=${BASE}..${HEAD}" >> "$GITHUB_OUTPUT"
            echo "mode=--range" >> "$GITHUB_OUTPUT"
          else
            echo "mode=--all" >> "$GITHUB_OUTPUT"
            echo "range=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run PII / leak scan
        run: |
          set -euo pipefail
          if [ "${{ steps.range.outputs.mode }}" = "--range" ]; then
            bash scripts/check-no-pii.sh --range "${{ steps.range.outputs.range }}"
          else
            bash scripts/check-no-pii.sh --all
          fi

      # Scan the PR title + body. The file diff and commit messages can be
      # clean while a leak hides in the PR description — that's the other half
      # of the PR #329 incident. Runs only on pull_request events; on push to
      # main there's no PR metadata, so the `if` skips it gracefully.
      #
      # Security: do NOT interpolate the title/body into the shell directly —
      # an attacker-controlled PR body could inject commands. Pass via env and
      # reference quoted ("$PR_TITLE" / "$PR_BODY").
      - name: Scan PR title + body for leak patterns
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail
          printf '%s\n%s\n' "$PR_TITLE" "$PR_BODY" > pr-meta.txt
          bash scripts/check-no-pii.sh --text pr-meta.txt

      # The guard's guard: prove the scanner itself still catches the
      # commit-message and --text leak paths, using only synthetic samples.
      - name: Self-check the PII scanner
        run: bash scripts/test-check-no-pii.sh
